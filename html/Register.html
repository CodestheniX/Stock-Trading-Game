<!doctype html>
<html lang="de">

<head>
  <title>Registrierung</title>
  <meta charset="UTF-8">
  <meta name="author" content="Albert Dumanov - 561092">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap (css & js) -->
  <link rel="stylesheet" href="../lib/css/bootstrap.min.css">
  <script src="../lib/js/bootstrap.bundle.min.js"></script>
  <script src="../lib/js/jquery-3.6.0.min.js"></script>
  <!-- Eigene (css & js) -->
  <link rel="stylesheet" href="../css/layout.css">
  <script src="../js/signup.js"></script>
</head>

<!-- Layout manuell, aber anhand folgender Vorlage erstellt: https://getbootstrap.com/docs/4.0/examples/checkout/ -->

<body>
  <form class="container col-12">
    <div class="row gx-0">
      <h1 class="mt-3 text-center">Registrierung</h1>
      <hr class="mb-2">
      <h3>Benutzerdaten</h3>

      <label for="Benutzer">Benutzername</label>
      <input type="text" id="Benutzer_register" class="form-control" placeholder="Benutzername" required autofocus>

      <label for="EMail" class="mt-2">E-Mail</label>
      <input type="email" id="EMail" class="form-control" placeholder="E-Mail-Adresse" required>
    </div>

    <div class="row mt-2">
      <div class="col-6">
        <label for="Passwort">Passwort</label>
        <input type="password" id="Passwort_register" class="form-control" placeholder="Passwort" required>
      </div>

      <div class="col-6">
        <label class="text-nowrap" for="Passwort_bestaetigen">Passwort bestätigen</label>
        <input type="password" id="Passwort_bestaetigen_register" class="form-control" placeholder="Passwort bestätigen" required>
      </div>

      <label class="mt-1 mb-2">
        <input type="checkbox" id="Passwort_zeigen" class="form-check-input" onclick="ShowPassword()"> Passwort anzeigen
      </label>
    </div>

    <hr class="mb-2">
    <h3>Kontaktdaten</h3>

    <div class="row mt-1">
      <div class="col-6">
        <label for="Vorname">Vorname</label>
        <input type="text" id="Vorname" class="form-control" placeholder="Vorname" justLetters required>
      </div>

      <div class="col-6">
        <label for="Nachname">Nachname</label>
        <input type="text" id="Nachname" class="form-control" placeholder="Nachname" justLetters required>
      </div>
    </div>

    <div class="row mt-1">
      <div class="col-6">
        <label for="Geburtsdatum">Geburtsdatum</label>
        <input type="date" id="Geburtsdatum" class="form-control" placeholder="Geburtsdatum" required>
      </div>

      <div class="col-6">
        <label class="text-nowrap" for="Geburtsort">Geburtsort (Optional)</label>
        <input type="text" id="Geburtsort" class="form-control" placeholder="Geburtsort" justLetters>
      </div>
    </div>

    <div class="row mt-2 gx-0">
      <label for="Strasse">Straße und Hausnummer</label>
      <input type="text" id="Strasse" class="form-control" placeholder="Straße und Hausnummer" required>

      <div class="col-4 col-sm-3">
        <label for="Postleitzahl" class="mt-2">Postleitzahl</label>
        <input type="number" id="Postleitzahl" class="form-control" placeholder="Postleitzahl" required>
      </div>
      <label class="col-1"></label>
      <div class="col-7 col-sm-8">
        <label for="Ort" class="mt-2">Ort</label>
        <input type="text" id="Ort" class="form-control" placeholder="Ort" required justLetters>
      </div>
    </div>

    <hr class="mb-4">
    <div class="col-12 row gx-0">
      <a class="btn btn-lg btn-outline-submit col-md my-1" onclick="ValidateInputs('Register')">Registrieren</a>
      <div class="col-2"></div>
      <a href="Login.html" class="btn btn-lg btn-outline-cancel col-md my-1" type="button">Abbrechen</a>
    </div>
  </form>  
</body>

</html>
